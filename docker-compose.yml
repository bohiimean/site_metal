services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-metal}
      POSTGRES_USER: ${DB_USER:-metal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-metal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-metal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: bash docker/django/start.sh
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
