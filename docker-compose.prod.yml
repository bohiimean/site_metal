# Production-стек: Postgres + Redis + Django (Gunicorn) + Nginx + certbot.
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Подробности и первый запуск (выпуск сертификата) — в DEPLOY.md.

# Фиксируем имя проекта, чтобы имена volumes (metal_media_data и т.д.)
# не зависели от имени директории — на них ссылаются бэкап-скрипты.
name: metal

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-metal}
      POSTGRES_USER: ${DB_USER:-metal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD обязателен в .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-metal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      args:
        REQUIREMENTS: requirements/production.txt
    command: bash docker/django/start-prod.sh
    restart: unless-stopped
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN обязателен в .env}
      # Второй домен-редиректор в punycode (напр. xn--80aejuogkn.xn--p1ai).
      # Пусто = второй домен выключен (см. default.conf.template).
      REDIRECT_DOMAIN: ${REDIRECT_DOMAIN:-}
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - web

  # Выпуск и автопродление TLS через Let's Encrypt по DNS-01 (reg.ru API).
  # DNS-01 не требует, чтобы LE достучался до хоста извне (на этом хосте
  # HTTP-01 не проходил multi-perspective-валидацию) — владение доменом
  # доказывается TXT-записью в зоне reg.ru. Один серт покрывает оба домена
  # (DOMAIN + REDIRECT_DOMAIN и их www) через SAN.
  # Первый выпуск — один раз вручную (см. DEPLOY.md, п.2); дальше daemon сам
  # продлевает (crond внутри контейнера) и переустанавливает серт в volume.
  # nginx перечитывает конфиг по host-cron (см. DEPLOY.md, п.4).
  acme:
    image: neilpang/acme.sh
    restart: unless-stopped
    command: daemon
    environment:
      REGRU_API_Username: ${REGRU_API_Username:?REGRU_API_Username обязателен в .env}
      REGRU_API_Password: ${REGRU_API_Password:?REGRU_API_Password обязателен в .env}
    volumes:
      - acme_data:/acme.sh
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  media_data:
  static_data:
  certbot_certs:
  # Челлендж-webroot больше не нужен для DNS-01, но nginx его монтирует (ro)
  # и держит HTTP-01-fallback location — оставлен, чтобы не менять монтирование.
  certbot_webroot:
  # Состояние acme.sh (аккаунт LE, сохранённые параметры issue/install-cert)
  acme_data:
