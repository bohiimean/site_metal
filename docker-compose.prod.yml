# Production-стек: Postgres + Redis + Django (Gunicorn) + Nginx + certbot.
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Подробности и первый запуск (выпуск сертификата) — в DEPLOY.md.

# Фиксируем имя проекта, чтобы имена volumes (metal_media_data и т.д.)
# не зависели от имени директории — на них ссылаются бэкап-скрипты.
name: metal

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-metal}
      POSTGRES_USER: ${DB_USER:-metal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD обязателен в .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-metal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
      args:
        REQUIREMENTS: requirements/production.txt
    command: bash docker/django/start-prod.sh
    restart: unless-stopped
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN обязателен в .env}
      # Второй домен-редиректор в punycode (напр. xn--80aejuogkn.xn--p1ai).
      # Пусто = второй домен выключен (см. default.conf.template).
      REDIRECT_DOMAIN: ${REDIRECT_DOMAIN:-}
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - web

  # TLS-серт (Let's Encrypt) выпускается и продлевается НЕ контейнером, а
  # нативным acme.sh на хосте (HTTP-01 через webroot этого nginx). Причина:
  # Docker Hub на этом хосте хронически отдаёт 429, а DNS-01 через reg.ru API
  # невозможен — зоны на хостинговом NS (ns1.hosting.reg.ru), а не на
  # регистраторском (ns1.reg.ru), который единственный поддерживает API.
  # acme.sh ставит собственный cron, кладёт серт в volume certbot_certs и
  # перезагружает nginx через --reloadcmd. Полностью: см. DEPLOY.md, п.2.

volumes:
  postgres_data:
  media_data:
  static_data:
  # Серты Let's Encrypt: пишет нативный acme.sh (live/<DOMAIN>/), читает nginx
  certbot_certs:
  # Webroot для HTTP-01-челленджа: nginx отдаёт /.well-known/acme-challenge/,
  # acme.sh кладёт туда токены при выпуске/продлении
  certbot_webroot:
