<header class="bg-surface border-b border-border" style="height:68px">
  <div class="max-w-7xl mx-auto px-6 lg:px-12 h-full flex items-center justify-between gap-6">

    <!-- Логотип -->
    <a href="/" class="text-[17px] font-bold tracking-tight shrink-0">
      МЕТА<span class="text-accent">ПРОФ</span>
    </a>

    <!-- Навигация -->
    <nav class="hidden md:flex items-center gap-7 text-[13px] font-medium text-muted">
      <a href="/catalog/" class="hover:text-primary transition-colors">Каталог</a>
      <a href="/dostavka/" class="hover:text-primary transition-colors">Доставка</a>
      <a href="/o-kompanii/" class="hover:text-primary transition-colors">О компании</a>
      <a href="/kontakty/" class="hover:text-primary transition-colors">Контакты</a>
    </nav>

    <div class="flex items-center gap-4 ml-auto">
      <!-- Поиск -->
      <form action="/search/" method="get"
            x-data="{ q: '{{ request.GET.q|default:''|escapejs }}' }"
            class="hidden lg:flex items-center gap-2 border border-border rounded-full px-3 py-1.5 w-44 focus-within:w-56 focus-within:border-accent transition-all duration-200">
        <button type="submit" class="shrink-0 text-muted hover:text-primary transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </button>
        <input type="text" name="q" x-model="q" placeholder="Поиск по каталогу…"
               class="flex-1 min-w-0 bg-transparent outline-none text-[12px] text-primary placeholder:text-muted">
        <button x-show="q" x-cloak type="button"
                @click="q = ''; $nextTick(() => $el.closest('form').submit())"
                class="shrink-0 text-muted hover:text-primary transition-colors leading-none">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none">
            <path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </form>

      <!-- Переключатель темы -->
      <div x-data="themeToggle">
        <button @click="toggle"
                class="w-8 h-8 flex items-center justify-center rounded text-muted hover:text-primary transition-colors"
                :aria-label="dark ? 'Светлая тема' : 'Тёмная тема'">
          <!-- Иконка солнца (светлая тема активна) -->
          <svg x-show="dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>
          </svg>
          <!-- Иконка луны (тёмная тема активна) -->
          <svg x-show="!dark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>

      <!-- Телефон -->
      <a href="tel:+74955405117" class="hidden xl:block text-[13px] font-semibold text-primary whitespace-nowrap">
        +7 (495) 540-51-17
      </a>

      <!-- Корзина -->
      <button @click="$store.cartUI.openCart()"
              class="relative w-8 h-8 flex items-center justify-center text-muted hover:text-primary transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-9H5.4M7 13L5.4 5M7 13l-1.5 6M17 13l1.5 6M9 19a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm8 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
        </svg>
        <span x-show="$store.cart.count > 0"
              x-text="$store.cart.count"
              class="absolute -top-1 -right-1 w-4 h-4 bg-accent text-accent-fg text-[9px] font-bold rounded-full flex items-center justify-center">
        </span>
      </button>
    </div>

  </div>
</header>
