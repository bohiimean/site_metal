{% comment %}
Фасет фильтра: чекбоксы по справочнику.
Параметры: title, name (имя GET-параметра), options (queryset), selected (list строк-pk)
{% endcomment %}
<div x-data="{open: true}" class="border-b border-border pb-4 mb-4">
  <button type="button" @click="open = !open"
          class="flex items-center justify-between w-full text-[11px] font-semibold uppercase tracking-widest text-muted mb-3">
    {{ title }}
    <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-0' : '-rotate-90'"
         fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
  <div x-show="open" x-collapse class="space-y-2">
    {% for opt in options %}
      <label class="flex items-center gap-2 text-[12px] text-primary cursor-pointer hover:text-accent transition-opacity">
        <input type="checkbox" name="{{ name }}" value="{{ opt.pk }}"
               {% if opt.pk|stringformat:'s' in selected %}checked{% endif %}
               {% if opt.material_id %}data-material="{{ opt.material_id }}"{% endif %}
               class="accent-[var(--color-accent)] w-3.5 h-3.5 rounded-sm">
        {% if opt.hex_code %}<span class="inline-block w-3 h-3 rounded-full border border-black/15 shrink-0"
                                   style="background:{{ opt.hex_code }}"></span>{% endif %}
        {{ opt.name }}
      </label>
    {% endfor %}
  </div>
</div>
